schemaVersion: 2.0.0

fileExistenceTests:
  - name: 'Python binary exists'
    path: '/opt/python/bin/python3'
    shouldExist: true

  - name: 'Python symlink exists'
    path: '/opt/python/bin/python'
    shouldExist: true

  - name: 'Pip binary exists'
    path: '/opt/python/bin/pip3'
    shouldExist: true

  - name: 'Working directory exists'
    path: '/app'
    shouldExist: true
    isExecutableBy: 'any'

  # Core Python libraries (standalone CPython under /opt/python)
  - name: 'Python standard library exists'
    path: '/opt/python/lib/python3.14'
    shouldExist: true

  - name: 'Python site-packages exists'
    path: '/opt/python/lib/python3.14/site-packages'
    shouldExist: true

  - name: 'SSL certificates for pip'
    path: '/etc/ssl/certs/ca-certificates.crt'
    shouldExist: true

fileContentTests:
  - name: 'CA certificates installed'
    path: '/etc/ssl/certs/ca-certificates.crt'
    expectedContents: ['-----BEGIN CERTIFICATE-----']
